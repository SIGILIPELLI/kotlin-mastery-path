site_name: Kotlin Mastery Path
site_description: A structured, module-wise Kotlin training program from entry level to master level.
site_url: https://sigilipelli.github.io/kotlin-mastery-path/
repo_url: https://github.com/SIGILIPELLI/kotlin-mastery-path
repo_name: kotlin-mastery-path

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Privacy Policy: privacy.md
  - "Level 1 · Entry":
      - Overview: level-1/index.md
      - "01 · Setup & First Program": level-1/01-setup.md
      - "02 · Variables & Types": level-1/02-variables-types.md
      - "03 · Control Flow": level-1/03-control-flow.md
      - "04 · Functions": level-1/04-functions.md
      - "05 · Classes & Objects Basics": level-1/05-classes-objects.md
      - "06 · Null Safety Basics": level-1/06-null-safety.md
      - "07 · Collections": level-1/07-collections.md
      - "08 · Data Classes": level-1/08-data-classes.md
      - "09 · Extension Functions Intro": level-1/09-extension-functions.md
      - "10 · Project — CLI To-Do App": level-1/10-project-todo-app.md
  - "Level 2 · Intermediate":
